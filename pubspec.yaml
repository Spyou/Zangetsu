name: watch_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.8.0+8600

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0

  # State / value equality
  equatable: ^2.0.7

  # DI
  get_it: ^8.0.3

  # Network
  dio: ^5.8.0+1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  # Extract the .srt/.ssa from SubDL's zipped subtitle downloads.
  archive: ^4.0.9

  # JS engine (QuickJS bridge)
  flutter_js: ^0.8.0

  # Hashing (SHA-256)
  crypto: ^3.0.6

  # AES-256-CTR for decrypting source lists from providers (e.g. AllAnime).
  pointycastle: ^3.9.1

  # Video playback (libmpv-based). _libs_video bundles the native libs (iOS pod).
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # "Load subtitle from file" in the player (document picker on iOS/Android).
  # Also used for backup import (file_picker >= 8.1.7 required for Uri return on Android 13+).
  file_picker: ^8.1.7

  # Image caching
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  # Dominant-colour extraction for the colour-matched hero banner
  palette_generator: ^0.3.3+3

  # JSON
  json_annotation: ^4.11.0

  # Open a source's web page in the system browser (Globe action on Detail).
  url_launcher: ^6.3.1

  # Native OS share sheet for the Detail "Share" action.
  # Pinned to 12.x — 13.x pulls win32 ^6 which conflicts with device_info_plus.
  share_plus: ^12.0.2

  # Save player screenshots to the gallery (Android MediaStore / iOS Photos).
  gal: ^2.3.0

  # Direct YouTube stream extraction (pure-Dart, no API key / native deps).
  # TrailerService resolves a YouTube id from metadata APIs (AniList / TMDB),
  # then youtube_explode_dart resolves it to a direct muxed (video+audio) URL
  # that media_kit plays natively — no iframe, no YouTube chrome (Netflix-style).
  youtube_explode_dart: ^3.1.0
  wakelock_plus: ^1.5.2
  appwrite: ^25.0.0
  image_picker: ^1.2.2
  # Swipe-for-brightness gesture in the player (left half of the surface).
  screen_brightness: ^2.1.4
  # CloudStream-style volume swipe: the right-half drag drives the REAL Android
  # system media volume for 0–100% (then mpv `af=volume` boosts beyond 100%),
  # exactly like CloudStream's slider. System UI is suppressed (we draw our HUD).
  flutter_volume_controller: ^2.0.1
  # Offline downloads — true background downloads with a progress notification,
  # pause/resume, and move-to-shared-storage (public Downloads folder).
  background_downloader: ^9.2.0
  permission_handler: ^11.3.1
  flutter_background_service: ^5.1.0
  # Local notifications for "new episode" alerts on subscribed shows.
  flutter_local_notifications: ^17.2.4
  # Discord Rich Presence: Gateway WebSocket + secure token storage + a WebView
  # for the Discord login (user-token capture).
  web_socket_channel: ^3.0.1
  flutter_secure_storage: ^9.2.2
  webview_flutter: ^4.10.0
  # Capture the OAuth redirect (zangetsu://anilist-auth) back into the app for
  # AniList account linking.
  app_links: ^6.3.2
  # Render the QR on the TV device-pairing screen (pure Dart).
  qr_flutter: ^4.1.0
  floating: ^6.0.0
  # In-app updates: read the running version + check GitHub Releases, then hand
  # the downloaded APK to the system installer.
  package_info_plus: ^9.0.1
  open_filex: ^4.5.0
  # Read the device's supported ABIs so the updater downloads the matching
  # per-ABI APK (smaller/faster than the fat universal) instead of guessing.
  device_info_plus: ^12.4.0
  flutter_colorpicker: ^1.1.0
  firebase_core: ^4.12.1
  firebase_analytics: ^12.4.5
  supabase_flutter: ^2.16.0
  firebase_messaging: ^16.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.1

# App launcher icon (Zangetsu logo). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#000000"
  min_sdk_android: 21

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    # No built-in providers — sources are installed from the Zangetsu repo.
    # Extractors stay bundled (shared video-host helpers, not providers).
    - extractors/example_embed.js
    - extractors/okru.js
    - extractors/mp4upload.js
    - extractors/streamlare.js
    - extractors/doodstream.js
    # Brand wordmark extracted from the logo (exact lettering) for header/splash.
    - assets/icon/wordmark.png
    # Square app icon — shown on the About screen.
    - assets/icon/app_icon.png

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    # Bundled subtitle font families (player Subtitle-style picker).
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: Open Sans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
    - family: Noto Sans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: Source Sans 3
      fonts:
        - asset: assets/fonts/SourceSans3-Regular.ttf
