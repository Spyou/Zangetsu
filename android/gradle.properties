org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# --- Build speed ---
# Run independent module tasks in parallel, reuse build outputs across builds,
# only configure projects needed for the requested tasks, and keep the Gradle
# daemon warm between runs. All safe; they only speed builds up.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.daemon=true
